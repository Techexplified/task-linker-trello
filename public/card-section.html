<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Task Linker</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: transparent;
        padding: 2px 0 4px;
      }

      .empty {
        font-size: 13px;
        color: #888;
        padding: 6px 0;
      }

      .dep-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .dep-item {
        display: flex;
        align-items: center;
        padding: 7px 10px;
        border-radius: 5px;
        font-size: 13px;
        color: #c8c8c8;
        gap: 6px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: background 0.15s;
      }

      .dep-item:hover {
        background: rgba(255, 255, 255, 0.07);
      }

      .rel-label {
        color: #888;
        flex-shrink: 0;
        font-size: 13px;
      }

      .card-name {
        color: #7eb8f7;
        font-weight: 500;
        text-decoration: underline;
        text-underline-offset: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }

      .board-name {
        font-size: 11px;
        color: #666;
        flex-shrink: 0;
        white-space: nowrap;
      }

      .btn-delete {
        background: none;
        border: none;
        color: #555;
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
        padding: 0 2px;
        flex-shrink: 0;
        transition: color 0.15s;
        margin-left: 4px;
      }
      .btn-delete:hover {
        color: #f66;
      }
    </style>
  </head>
  <body>
    <ul class="dep-list" id="depList">
      <li class="empty">Loading…</li>
    </ul>

    <script>
      var t = TrelloPowerUp.iframe();

      var DEPS_KEY = "task-linker-deps";
      var currentCardId = null;
      var dependencies = [];

      var INVERSE = {
        blocks: "blocked-by",
        "blocked-by": "blocks",
        "related-to": "related-to",
        "child-of": "parent-to",
        "parent-to": "child-of",
        // legacy keys
        "is-blocked-by": "blocks",
        "is-related-to": "related-to",
        "is-duplicate-to": "is-duplicate-to",
        "is-child-to": "parent-to",
        "is-parent-to": "child-of",
      };

      var REL_LABELS = {
        blocks: "Blocks",
        "blocked-by": "Blocked by",
        "related-to": "Related to",
        "child-of": "Child of",
        "parent-to": "Parent to",
        "is-blocked-by": "Blocked by",
        "is-related-to": "Related to",
        "is-duplicate-to": "Duplicate of",
        "is-child-to": "Child of",
        "is-parent-to": "Parent to",
      };

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      var currentCardId = null;
      var dependencies = [];

      function getDepsMap() {
        return t.get("member", "shared", DEPS_KEY).then(function (m) {
          return m || {};
        });
      }

      function saveDepsMap(map) {
        return t.set("member", "shared", DEPS_KEY, map);
      }

      function removeDep(idx) {
        var removed = dependencies[idx];
        return t.get("member", "shared", DEPS_KEY).then(function (map) {
          map = map || {};
          // Update current card
          dependencies.splice(idx, 1);
          map[currentCardId] = dependencies;
          // Remove inverse
          var otherDeps = (map[removed.id] || []).filter(function (d) {
            return d.id !== currentCardId;
          });
          map[removed.id] = otherDeps;
          return t.set("member", "shared", DEPS_KEY, map);
        });
        // No need to call render() manually, t.render handles it!
      }

      function render() {
        var list = document.getElementById("depList");

        if (!dependencies.length) {
          list.innerHTML = '<li class="empty">No linked cards.</li>';
          t.sizeTo("#depList").catch(function () {});
          return;
        }

        list.innerHTML = "";
        dependencies.forEach(function (dep, idx) {
          var li = document.createElement("li");
          li.className = "dep-item";

          var relLabel = REL_LABELS[dep.rel] || dep.rel || "";
          var boardHtml = dep.boardName
            ? '<span class="board-name">' + escHtml(dep.boardName) + "</span>"
            : "";

          li.innerHTML =
            '<span class="rel-label">' +
            escHtml(relLabel) +
            "</span>" +
            '<span class="card-name">' +
            escHtml(dep.name) +
            "</span>" +
            boardHtml +
            '<button class="btn-delete" data-idx="' +
            idx +
            '" title="Remove link">✕</button>';

          list.appendChild(li);
        });

        list.querySelectorAll(".btn-delete").forEach(function (btn) {
          btn.addEventListener("click", function () {
            removeDep(parseInt(btn.getAttribute("data-idx")));
          });
        });

        t.sizeTo("#depList").catch(function () {});
      }

      // Init
      t.render(function () {
        return t
          .card("id")
          .then(function (card) {
            currentCardId = card.id;
            return t.get("member", "shared", DEPS_KEY);
          })
          .then(function (map) {
            dependencies = map && map[currentCardId] ? map[currentCardId] : [];
            render();
          });
      });
    </script>
  </body>
</html>
