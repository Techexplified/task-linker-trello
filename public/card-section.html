<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Task Linker</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: transparent;
        padding: 2px 0 4px;
      }

      .empty {
        font-size: 13px;
        color: #888;
        padding: 6px 0;
      }

      .dep-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .dep-item {
        display: flex;
        align-items: center;
        padding: 7px 10px;
        border-radius: 5px;
        font-size: 13px;
        color: #c8c8c8;
        gap: 6px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: background 0.15s;
      }

      .dep-item:hover {
        background: rgba(255, 255, 255, 0.07);
      }

      .rel-label {
        color: #888;
        flex-shrink: 0;
        font-size: 13px;
      }

      .card-name {
        color: #7eb8f7;
        font-weight: 500;
        text-decoration: underline;
        text-underline-offset: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }

      .board-name {
        font-size: 11px;
        color: #666;
        flex-shrink: 0;
        white-space: nowrap;
      }

      .btn-delete {
        background: none;
        border: none;
        color: #555;
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
        padding: 0 2px;
        flex-shrink: 0;
        transition: color 0.15s;
        margin-left: 4px;
      }

      .btn-delete:hover {
        color: #f66;
      }

      .blocking-alert {
        background: #622e2e;
        border-left: 4px solid #ff4c4c;
        padding: 10px;
        margin-bottom: 12px;
        border-radius: 4px;
        font-size: 12px;
        display: none;
        /* Hidden by default */
      }

      .blocking-alert strong {
        color: #ff8e8e;
      }
    </style>
  </head>

  <body>
    <div id="blockingAlert" class="blocking-alert"></div>

    <ul class="dep-list" id="depList">
      <li class="empty">Loading…</li>
    </ul>

    <script>
      var t = TrelloPowerUp.iframe();

      var DEPS_KEY = "task-linker-deps";
      var currentCardId = null;
      var dependencies = [];

      var INVERSE = {
        blocks: "blocked-by",
        "blocked-by": "blocks",
        "related-to": "related-to",
        "child-of": "parent-to",
        "parent-to": "child-of",
        // legacy keys
        "is-blocked-by": "blocks",
        "is-related-to": "related-to",
        "is-duplicate-to": "is-duplicate-to",
        "is-child-to": "parent-to",
        "is-parent-to": "child-of",
      };

      var REL_LABELS = {
        blocks: "Blocks",
        "blocked-by": "Blocked by",
        "related-to": "Related to",
        "child-of": "Child of",
        "parent-to": "Parent to",
        "is-blocked-by": "Blocked by",
        "is-related-to": "Related to",
        "is-duplicate-to": "Duplicate of",
        "is-child-to": "Child of",
        "is-parent-to": "Parent to",
      };

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      var currentCardId = null;
      var dependencies = [];

      function getDepsMap() {
        return t.get("member", "shared", DEPS_KEY).then(function (m) {
          return m || {};
        });
      }

      function saveDepsMap(map) {
        return t.set("member", "shared", DEPS_KEY, map);
      }

      function removeDep(idx) {
        var removed = dependencies[idx];
        return t.get("member", "shared", DEPS_KEY).then(function (map) {
          map = map || {};
          // Update current card
          dependencies.splice(idx, 1);
          map[currentCardId] = dependencies;
          // Remove inverse
          var otherDeps = (map[removed.id] || []).filter(function (d) {
            return d.id !== currentCardId;
          });
          map[removed.id] = otherDeps;
          return t.set("member", "shared", DEPS_KEY, map);
        });
        // No need to call render() manually, t.render handles it!
      }

     function render() {
      var list = document.getElementById("depList");
      var alertBox = document.getElementById("blockingAlert");

      if (!dependencies.length) {
        list.innerHTML = '<li class="empty">No linked cards.</li>';
        if(alertBox) alertBox.style.display = "none";
        t.sizeTo("body").catch(() => {});
        return;
      }

      // 1. Initial Render
      list.innerHTML = "";
      dependencies.forEach(function (dep, idx) {
        var li = document.createElement("li");
        li.className = "dep-item";
        li.id = "dep-" + dep.id; // Give it an ID so we can strike it out later
        var relLabel = REL_LABELS[dep.rel] || dep.rel || "";
        var boardHtml = dep.boardName ? `<span class="board-name">${escHtml(dep.boardName)}</span>` : "";

        li.innerHTML = `
          <span class="rel-label">${escHtml(relLabel)}</span>
          <span class="card-name" style="cursor:pointer; color:#7eb8f7; text-decoration:underline;">${escHtml(dep.name)}</span>
          ${boardHtml}
          <button class="btn-delete" data-idx="${idx}" title="Remove link">✕</button>
        `;

        li.querySelector(".card-name").addEventListener("click", () => t.showCard(dep.id));
        list.appendChild(li);
      });

      list.querySelectorAll(".btn-delete").forEach(btn => {
        btn.addEventListener("click", function () { removeDep(parseInt(btn.getAttribute("data-idx"))); });
      });

      // 2. Alert Box Logic
      const blockers = dependencies.filter(d => d.rel === "blocked-by" || d.rel === "is-blocked-by");
      if (alertBox) {
        if (blockers.length > 0) {
          alertBox.style.display = "block";
          alertBox.innerHTML = `<strong>BLOCKED:</strong> Waiting on '${escHtml(blockers[0].name)}'`;
        } else {
          alertBox.style.display = "none";
        }
      }

      t.sizeTo("body").catch(() => {});

      // 3. V2 SMART SYNC: Check if blockers are actually resolved
      if (blockers.length > 0 && token) {
        blockers.forEach(blocker => {
          fetch(`https://api.trello.com/1/cards/${blocker.id}?key=${API_KEY}&token=${token}&fields=closed,idList`)
            .then(res => res.json())
            .then(cardData => {
              if (!cardData) return;
              
              // Check if the card is archived
              if (cardData.closed) {
                markAsResolved(blocker.id, "Archived");
              } else {
                // Check if the list name implies "Done"
                fetch(`https://api.trello.com/1/lists/${cardData.idList}?key=${API_KEY}&token=${token}&fields=name`)
                  .then(res => res.json())
                  .then(listData => {
                    const lName = listData.name.toLowerCase();
                    if (lName.includes("done") || lName.includes("complete")) {
                      markAsResolved(blocker.id, "Done");
                    }
                  });
              }
            }).catch(e => console.log("Card might be deleted", e));
        });
      }
    }

    // Helper to visually strike-through resolved blockers
    function markAsResolved(cardId, reason) {
      const li = document.getElementById("dep-" + cardId);
      if (li) {
        const nameSpan = li.querySelector(".card-name");
        nameSpan.style.textDecoration = "line-through";
        nameSpan.style.color = "#888";
        
        const label = li.querySelector(".rel-label");
        label.innerHTML = `<span style="color:#4caf50;">✓ RESOLVED (${reason})</span>`;
        
        // Hide the red alert box if the blocker is resolved
        var alertBox = document.getElementById("blockingAlert");
        if(alertBox) alertBox.style.display = "none";
      }
    }

    // Updated Init to capture Token for API calls
    t.render(function () {
      return Promise.all([
        t.card("id"),
        t.get("member", "shared", DEPS_KEY),
        t.get("member", "private", "task-linker-auth") // Get Token!
      ]).then(function (res) {
        currentCardId = res[0].id;
        var map = res[1];
        token = res[2]; // Save token for Smart Sync
        dependencies = map && map[currentCardId] ? map[currentCardId] : [];
        render();
      });
    });
    </script>
  </body>
</html>
