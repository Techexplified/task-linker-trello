<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Linker – Dependencies</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: #2d2d2d;
        color: #e8e8e8;
        padding: 16px 20px 20px;
      }

      .section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #777;
        margin-bottom: 10px;
      }

      .dep-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      .dep-item {
        display: flex;
        justify-content: space-between;
        background: #383838;
        border-radius: 6px;
        padding: 8px 10px;
      }

      .dep-info {
        display: flex;
        flex-direction: column;
      }

      .dep-name {
        font-size: 13px;
      }

      .dep-type {
        font-size: 11px;
        color: #888;
      }

      .dep-item button {
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
      }

      .empty {
        font-size: 13px;
        color: #555;
      }

      .divider {
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        margin: 12px 0;
      }

      .field-label {
        font-size: 11px;
        margin-bottom: 6px;
        display: block;
        color: #777;
      }

      .rel-select,
      .search-box {
        width: 100%;
        padding: 9px;
        background: #1e1e1e;
        border: 1px solid #444;
        border-radius: 6px;
        color: #fff;
        margin-bottom: 10px;
      }

      .results-list {
        max-height: 150px;
        overflow-y: auto;
      }

      .result-item {
        padding: 8px;
        background: #383838;
        border-radius: 5px;
        margin-bottom: 4px;
        cursor: pointer;
      }

      .result-item:hover {
        background: #464646;
      }

      .board-name {
        font-size: 11px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <p class="section-title">Linked Cards</p>
    <ul id="depList"></ul>

    <div class="divider"></div>

    <p class="section-title">Add Link</p>

    <label class="field-label">Link Type</label>
    <select id="relSelect" class="rel-select">
      <option value="blocks">Blocks</option>
      <option value="is-blocked-by">Blocked by</option>
      <option value="is-related-to">Related</option>
      <option value="is-child-to">Child of</option>
      <option value="is-parent-to">Parent of</option>
    </select>

    <label class="field-label">Search Cards</label>
    <input
      id="searchBox"
      class="search-box"
      placeholder="Search across boards..."
    />
    <ul id="resultsList" class="results-list"></ul>

    <script>
      var t = TrelloPowerUp.iframe();
      const API_KEY = "cd814b7c7f01e5029860d3eed20daae5";

      var currentCard;
      var dependencies = [];
      var allCards = [];

      const REL_LABELS = {
        blocks: "Blocks",
        "is-blocked-by": "Blocked by",
        "is-related-to": "Related",
        "is-child-to": "Child of",
        "is-parent-to": "Parent of",
      };

      const INVERSE = {
        blocks: "is-blocked-by",
        "is-blocked-by": "blocks",
        "is-related-to": "is-related-to",
        "is-child-to": "is-parent-to",
        "is-parent-to": "is-child-to",
      };

      function renderDeps() {
        var list = document.getElementById("depList");

        if (!dependencies.length) {
          list.innerHTML = '<li class="empty">No links set.</li>';
          return;
        }

        list.innerHTML = "";

        dependencies.forEach((dep, idx) => {
          var li = document.createElement("li");
          li.className = "dep-item";

          li.innerHTML = `
            <div class="dep-info">
              <span>${dep.name}</span>
              <span class="dep-type">${REL_LABELS[dep.rel]}</span>
            </div>
            <button data-idx="${idx}">✕</button>
          `;

          li.querySelector("button").onclick = () => removeDependency(idx);

          list.appendChild(li);
        });
      }

      // --- Updated removeDependency ---
      function removeDependency(idx) {
        var removed = dependencies[idx];
        dependencies.splice(idx, 1);

        Promise.all([
          // Change "board" to "card" for current card
          t.set("card", "shared", "card-deps-" + currentCard.id, dependencies),
          // Change "board" to "card" for the linked card
          t
            .get(removed.id, "shared", "card-deps-" + removed.id)
            .then((arr) => (arr || []).filter((d) => d.id !== currentCard.id))
            .then((arr) =>
              t.set(removed.id, "shared", "card-deps-" + removed.id, arr),
            ),
        ]).then(renderDeps);
      }

      // --- Updated addDependency ---
      function addDependency(dep) {
        dependencies.push(dep);

        Promise.all([
          // Change "board" to "card" for current card
          t.set("card", "shared", "card-deps-" + currentCard.id, dependencies),
          // Change "board" to "card" for the linked card
          // Note: We pass dep.id to t.get/set to target the other card specifically
          t.get(dep.id, "shared", "card-deps-" + dep.id).then((arr) => {
            arr = arr || [];
            if (!arr.some((d) => d.id === currentCard.id)) {
              arr.push({
                id: currentCard.id,
                name: currentCard.name,
                rel: INVERSE[dep.rel],
              });
            }
            return t.set(dep.id, "shared", "card-deps-" + dep.id, arr);
          }),
        ]).then(renderDeps);
      }

      // ✅ Fetch all boards + cards
      function fetchAllCards(token) {
        return fetch(
          `https://api.trello.com/1/members/me/boards?key=${API_KEY}&token=${token}`,
        )
          .then((res) => res.json())
          .then((boards) =>
            Promise.all(
              boards.map((board) =>
                fetch(
                  `https://api.trello.com/1/boards/${board.id}/cards?key=${API_KEY}&token=${token}`,
                )
                  .then((res) => res.json())
                  .then((cards) =>
                    cards.map((c) => ({
                      id: c.id,
                      name: c.name,
                      board: board.name,
                    })),
                  ),
              ),
            ),
          )
          .then((results) => results.flat());
      }

      // Init
      t.card("id", "name")
        .then((card) => {
          currentCard = card;
          // Change "board" to "card"
          return t.get("card", "shared", "card-deps-" + card.id);
        })
        .then((deps) => {
          dependencies = deps || [];
          renderDeps();
        });

      // Load cross-board cards
      t.get("member", "private", "task-linker-auth").then((token) => {
        if (!token) return;
        fetchAllCards(token).then((cards) => {
          allCards = cards;
        });
      });

      // Search
      document
        .getElementById("searchBox")
        .addEventListener("input", function () {
          var q = this.value.toLowerCase().trim();
          var list = document.getElementById("resultsList");
          list.innerHTML = "";

          if (!q) return;

          var matches = allCards
            .filter(
              (c) =>
                c.name.toLowerCase().includes(q) &&
                c.id !== currentCard.id &&
                !dependencies.some((d) => d.id === c.id),
            )
            .slice(0, 8);

          matches.forEach((c) => {
            var li = document.createElement("li");
            li.className = "result-item";

            li.innerHTML = `
            ${c.name}
            <div class="board-name">${c.board}</div>
          `;

            li.onclick = () => {
              addDependency({
                id: c.id,
                name: c.name,
                rel: document.getElementById("relSelect").value,
              });

              list.innerHTML = "";
              document.getElementById("searchBox").value = "";
            };

            list.appendChild(li);
          });
        });
    </script>
  </body>
</html>
