<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Linker – Authorize</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: #2d2d2d;
        color: #e8e8e8;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 0;
      }

      .popup {
        background: #2d2d2d;
        width: 100%;
        padding: 28px 24px 24px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .intro-text {
        font-size: 14px;
        line-height: 1.6;
        color: #d4d4d4;
        text-align: center;
        margin-bottom: 18px;
      }

      .divider {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        margin: 0 0 18px;
      }

      .info-text {
        font-size: 13px;
        line-height: 1.65;
        color: #b8b8b8;
        text-align: center;
        margin-bottom: 22px;
      }

      .btn-authorize {
        display: block;
        width: 100%;
        padding: 11px 0;
        background: #3a3f4a;
        color: #e0e0e0;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.18s,
          color 0.18s,
          transform 0.1s;
        margin-bottom: 22px;
        letter-spacing: 0.01em;
      }
      .btn-authorize:hover {
        background: #4a5263;
        color: #fff;
      }
      .btn-authorize:active {
        transform: scale(0.98);
      }
      .btn-authorize:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .success {
        text-align: center;
        font-size: 14px;
        color: #5cb85c;
        margin-bottom: 16px;
      }

      .footer-links {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        flex-wrap: wrap;
      }

      .footer-links a {
        font-size: 13px;
        color: #8fa0c0;
        text-decoration: underline;
        text-underline-offset: 2px;
        transition: color 0.15s;
      }
      .footer-links a:hover {
        color: #a0bfff;
      }
      .footer-links .dot {
        color: #555;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <div class="popup">
      <p class="intro-text">
        This Power-Up needs access to your boards. This is a stand-alone
        Power-Up, which stores the card relationship within the Trello itself.
      </p>

      <hr class="divider" />

      <div id="authorizeSection">
        <button class="btn-authorize" id="authorizeBtn">
          Click to authorize
        </button>
      </div>

      <div class="footer-links">
        <a href="https://your-app.vercel.app/faq" target="_blank">FAQ</a>
        <span class="dot">•</span>
        <a href="https://your-app.vercel.app/learn-more" target="_blank"
          >Learn more</a
        >
        <span class="dot">•</span>
        <a href="https://your-app.vercel.app/privacy" target="_blank"
          >Privacy policy</a
        >
      </div>
    </div>

    <script>
      var t = TrelloPowerUp.iframe();

      var API_KEY = "YOUR_TRELLO_API_KEY"; // ← replace
      var AUTH_KEY = "task-linker-auth";

      var authScope = {
        name: "Task Linker",
        key: API_KEY,
        expiration: "never",
        scope: "read,write",
      };

      function showAuthorized() {
        var section = document.getElementById("authorizeSection");
        section.innerHTML = '<p class="success">✓ Authorized successfully</p>';
        // Close the popup after a short delay
        setTimeout(function () {
          t.closePopup();
        }, 800);
      }

      /*
       * t.render() re-runs whenever storage changes.
       * This means if the user completes auth in the popup window,
       * the iframe re-renders and shows the success state immediately.
       */
      t.render(function () {
        return t.get("member", "private", AUTH_KEY).then(function (token) {
          if (token) {
            showAuthorized();
          }
        });
      });

      document
        .getElementById("authorizeBtn")
        .addEventListener("click", function () {
          var btn = document.getElementById("authorizeBtn");
          btn.disabled = true;
          btn.textContent = "Authorizing…";

          /*
           * t.authorize() is the OFFICIAL Trello Power-Up authorization method.
           * It opens a popup window, handles the OAuth flow entirely within
           * Trello's infrastructure, and returns the token directly — no
           * callback page needed, no cross-origin navigation, no console errors.
           */
          t.authorize(
            "https://trello.com/1/authorize" +
              "?name=" +
              encodeURIComponent("Task Linker") +
              "&key=" +
              encodeURIComponent(API_KEY) +
              "&expiration=never" +
              "&response_type=token" +
              "&scope=read%2Cwrite",
            { height: 680, width: 580 },
          )
            .then(function (token) {
              // Save the token — t.render() will fire automatically and show success
              return t.set("member", "private", AUTH_KEY, token);
            })
            .then(function () {
              showAuthorized();
            })
            .catch(function (err) {
              btn.disabled = false;
              btn.textContent = "Click to authorize";
              console.error("Authorization failed:", err);
            });
        });
    </script>
  </body>
</html>
